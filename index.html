<style>
:root{
  --ink:#14171f; --paper:#f6f4ee; --card:#ffffff;
  --line:#e3ded2; --mut:#6b7180;
  --teal:#0f6e63; --teal-d:#0a4a43;
  --amber:#e08a1e; --red:#c8442b; --green:#1f8a4c;
  --shopee:#ee4d2d; --lazada:#7b1fa2; --fb:#1877f2;
  --shadow:0 1px 3px rgba(20,23,31,.06),0 8px 30px rgba(20,23,31,.06);

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'IBM Plex Sans Thai',sans-serif;
  background:var(--paper); color:var(--ink);
  -webkit-font-smoothing:antialiased; overflow:hidden;
}
.num{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums}

/* ---- deck shell ---- */
#deck{height:100vh;width:100vw;position:relative}
.slide{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  padding:clamp(20px,4vw,56px) clamp(20px,5vw,72px);
  opacity:0;transform:translateY(14px);
  transition:opacity .45s ease,transform .45s ease;
  overflow-y:auto;
}
.slide.active{display:flex;opacity:1;transform:none}
.slide-inner{width:100%;max-width:1180px;margin:0 auto;flex:1;display:flex;flex-direction:column;justify-content:center}

/* ---- eyebrow / titles ---- */
.eyebrow{
  font-family:'Space Grotesk',sans-serif;font-weight:500;
  letter-spacing:.18em;text-transform:uppercase;
  font-size:.72rem;color:var(--teal);margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}
.eyebrow::before{content:"";width:26px;height:2px;background:var(--teal)}
h1{font-family:'Sarabun',sans-serif;font-weight:800;line-height:1.05;
  font-size:clamp(2rem,5.2vw,3.9rem);letter-spacing:-.01em}
h2{font-family:'Sarabun',sans-serif;font-weight:800;
  font-size:clamp(1.5rem,3.4vw,2.5rem);line-height:1.1;margin-bottom:6px}
.sub{color:var(--mut);font-size:clamp(.95rem,1.5vw,1.15rem);margin-top:14px;max-width:60ch;line-height:1.6}

/* ---- cover ---- */
.cover{justify-content:center}
.cover .badge{display:inline-flex;align-items:center;gap:8px;background:#fff;
  border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:.85rem;
  color:var(--mut);box-shadow:var(--shadow);margin-bottom:28px;width:max-content}
.cover .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.cover-stats{display:flex;flex-wrap:wrap;gap:14px;margin-top:38px}
.cover-stat{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px 22px;box-shadow:var(--shadow);min-width:160px}
.cover-stat .v{font-family:'Space Grotesk';font-weight:700;font-size:1.7rem;line-height:1}
.cover-stat .l{color:var(--mut);font-size:.82rem;margin-top:6px}

/* ---- generic grid cards ---- */
.grid{display:grid;gap:16px}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:22px;box-shadow:var(--shadow)}
.card h3{font-size:1.05rem;font-weight:700;margin-bottom:4px}

/* platform color chips */
.chip{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:.8rem;
  padding:4px 11px;border-radius:999px;color:#fff}
.chip.sh{background:var(--shopee)} .chip.lz{background:var(--lazada)} .chip.fb{background:var(--fb)}

/* ---- KPI ring ---- */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:8px}
.kpi{position:relative;background:var(--card);border:1px solid var(--line);
  border-radius:18px;padding:22px;box-shadow:var(--shadow);text-align:center}
.kpi .plat{font-weight:700;font-size:.95rem;margin-bottom:14px}
.ring{width:118px;height:118px;margin:0 auto 12px}
.kpi .big{font-family:'Space Grotesk';font-weight:700;font-size:1.05rem;margin-top:2px}
.kpi .sales{color:var(--mut);font-size:.8rem;margin-top:8px}
.pass{color:var(--green);font-weight:600} .fail{color:var(--red);font-weight:600}

/* ---- tables ---- */
.tbl-wrap{background:var(--card);border:1px solid var(--line);border-radius:16px;
  overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:.86rem}
th,td{padding:10px 14px;text-align:right;white-space:nowrap}
th:first-child,td:first-child{text-align:left}
thead th{background:#fbfaf6;font-weight:600;color:var(--mut);font-size:.74rem;
  letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--line)}
tbody tr+tr td{border-top:1px solid var(--line)}
tbody tr:hover td{background:#fbfaf6}
.bar-cell{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.bar{height:8px;border-radius:4px;background:var(--teal);max-width:120px}
.flag{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;
  border-radius:6px;background:#fdecea;color:var(--red)}
.ok{background:#e9f6ee;color:var(--green)}

.rank{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.rank-row{display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:14px}
.rank-row .nm{font-weight:600;font-size:.92rem}
.rbar{height:30px;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;
  padding:0 10px;color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:.82rem;
  min-width:42px;transition:width .8s cubic-bezier(.2,.8,.2,1)}

.fee-card{background:var(--card);border:1px solid var(--line);border-radius:18px;

.fee-line{display:flex;justify-content:space-between;align-items:center;

.fee-line:last-child{border-bottom:none}
.fee-line .pct{font-family:'Space Grotesk';font-weight:700}
.fee-total{display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;
  border-top:2px solid var(--ink);font-weight:700;font-size:1.05rem}
.waterfall{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.wf{display:flex;align-items:center;gap:12px}
.wf .lbl{width:130px;font-size:.85rem;color:var(--mut)}
.wf .track{flex:1;height:26px;background:#f0ede4;border-radius:7px;overflow:hidden;position:relative}
.wf .fill{height:100%;border-radius:7px;display:flex;align-items:center;padding:0 10px;
  color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:.78rem}

  padding:16px 18px;box-shadow:var(--shadow)}
.tip .ic{font-family:'Space Grotesk';font-weight:700;color:var(--teal);font-size:1.1rem;flex:none}
.tip h4{font-size:.98rem;margin-bottom:3px}
.tip p{color:var(--mut);font-size:.88rem;line-height:1.5}

.tgt .nm{width:120px;font-weight:600;font-size:.92rem;flex:none}
.tgt .track{flex:1;height:34px;background:#f0ede4;border-radius:9px;overflow:hidden;position:relative}
.tgt .fill{height:100%;border-radius:9px;display:flex;align-items:center;padding:0 12px;

.tgt .meta{width:200px;flex:none;font-size:.82rem;color:var(--mut);text-align:right}
.tgt .meta b{font-family:'Space Grotesk';color:var(--ink)}

.hero-tgt .track{flex:1;height:46px;background:#f0ede4;border-radius:11px;overflow:hidden}
.hero-tgt .fill{height:100%;border-radius:11px;display:flex;align-items:center;padding:0 16px;
  color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:1rem;transition:width .9s cubic-bezier(.2,.8,.2,1)}

.nav{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px;
  padding:7px 10px;box-shadow:var(--shadow);z-index:50}
.nav button{border:none;background:transparent;cursor:pointer;width:34px;height:34px;
  border-radius:50%;font-size:1rem;color:var(--ink);display:flex;align-items:center;justify-content:center}
.nav button:hover{background:var(--paper)}
.nav .count{font-family:'Space Grotesk';font-weight:700;font-size:.85rem;
  padding:0 8px;color:var(--mut);min-width:56px;text-align:center}
.progress{position:fixed;top:0;left:0;height:3px;background:var(--teal);z-index:60;transition:width .4s}
.dots{position:fixed;right:20px;top:50%;transform:translateY(-50%);display:flex;
  flex-direction:column;gap:9px;z-index:50}
.dots span{width:8px;height:8px;border-radius:50%;background:var(--line);cursor:pointer;transition:.3s}
.dots span.on{background:var(--teal);transform:scale(1.35)}
.slide-no{position:fixed;bottom:26px;right:26px;font-family:'Space Grotesk';
  font-weight:700;color:var(--mut);font-size:.8rem;z-index:40}
.hint{position:fixed;bottom:26px;left:26px;color:var(--mut);font-size:.78rem;z-index:40}

@media(max-width:820px){
  .cols-3,.cols-2,.kpi-row{grid-template-columns:1fr}
  .rank-row{grid-template-columns:90px 1fr auto}
  .dots{display:none}
  .slide{padding:20px 18px 90px}
  table{font-size:.78rem}
  th,td{padding:8px 9px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

      <div class="cover-stat"><div class="v">${Object.keys(JUNE).length}</div><div class="l">สาขา</div></div>
    </div>
  </div>`;
}

// 2. agenda
function sAgenda(){
  const items=[
    ['01','ยอดขายเทียบเป้า','ภาพรวม 5 สาขา ทำได้กี่ % ของเป้าเดือนมิถุนายน'],
    ['02','เจาะรายสาขา','เป้า/ทำได้รายคน พร้อมข้อเสนอแนะแต่ละสาขา'],
    ['03','% ค่าโฆษณา Facebook','เทียบค่าโฆษณาต่อยอดขาย เกณฑ์ไม่เกิน 35%'],
    ['04','เกณฑ์ค่าธรรมเนียม','เกณฑ์ควบคุม % ค่าธรรมเนียมต่อยอดขาย'],
    ['05','ประกาศปรับค่าธรรมเนียม','Shopee และ Lazada ปรับค่าธรรมเนียมใหม่'],
    ['06','เป้าหมายเดือน ก.ค.','ความคืบหน้ายอดขาย ณ วันที่ 10'],
  ];
  return `<div class="slide-inner">
    <div class="eyebrow">Agenda</div>
    <h2>หัวข้อการประชุมวันนี้</h2>
    <div class="grid cols-3" style="margin-top:26px">
    ${items.map(([n,t,d])=>`<div class="card">
      <div class="num" style="font-size:1.6rem;font-weight:700;color:var(--teal)">${n}</div>
      <h3 style="margin-top:8px">${t}</h3>
      <p style="color:var(--mut);font-size:.88rem;margin-top:4px;line-height:1.5">${d}</p>
    </div>`).join('')}
    </div>
  </div>`;
}

// 3. overview progress
function sOverview(){
  const rows=Object.entries(JUNE).map(([b,d])=>({b,...d,pc:d.actual/d.target*100}))
    .sort((a,b)=>b.pc-a.pc);
  return `<div class="slide-inner">
    <div class="eyebrow">01 · Sales vs Target · มิถุนายน</div>
    <h2>ยอดขายเทียบเป้าหมาย — ภาพรวมรายสาขา</h2>
    <p class="sub">แต่ละสาขาทำยอดได้กี่ % ของเป้าที่ตั้งไว้ในเดือนมิถุนายน (รายละเอียดรายคนอยู่หน้าถัดไป)</p>
    <div style="margin-top:22px">
    ${rows.map(r=>`<div class="tgt">
      <span class="nm">${r.b}</span>
      <div class="track"><div class="fill" style="width:${Math.min(r.pc,100)}%;background:${tgtColor(r.pc)}">${r.pc.toFixed(1)}%</div></div>
      <span class="meta">ทำได้ <b>${fmt(r.actual)}</b> / เป้า <b>${fmt(r.target)}</b></span>
    </div>`).join('')}
    </div>
  </div>`;
}

// 4. per-branch
function sBranch(bname){
  const d=JUNE[bname];
  const pc=d.actual/d.target*100;
  const platRow=(st)=>{
    const order=['sh','lz','fb'].filter(p=>st.g&&st.g[p]);
    const cells=order.map(p=>{
      const [tg,ac]=st.g[p];
      const acN=ac==null?0:ac;
      const has=tg!=null&&tg>0;
      const ppc=has?acN/tg*100:null;
      const col=ppc==null?'var(--mut)':tgtColor(ppc);
      const barW=ppc==null?(acN>0?100:0):Math.min(ppc,100);
      return `<div style="margin:5px 0">
        <div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:2px">
          <span><span class="chip ${p}" style="font-size:.62rem;padding:1px 7px">${PNAME[p]}</span></span>
          <span class="num" style="color:var(--mut)">ทำได้ ${fmt(ac)}${has?' / เป้า '+fmt(tg):''} ${ppc!=null?'· <b style="color:'+col+'">'+ppc.toFixed(0)+'%</b>':''}</span>
        </div>
        <div style="height:10px;background:#f0ede4;border-radius:5px;overflow:hidden">
          <div style="height:100%;width:${barW}%;background:${col};border-radius:5px"></div>
        </div>
      </div>`;
    }).join('');
    const tt=st.total_target?`<span class="num" style="color:var(--mut);font-size:.8rem">เป้ารวม ${fmt(st.total_target)}</span>`:'';
    return `<div class="card" style="padding:16px 18px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <h3 style="font-size:1.02rem">${st.name}</h3>${tt}
      </div>${cells}
    </div>`;
  };
  const n=d.staff.length;
  const colClass=n<=2?'cols-2':'cols-3';
  const advice=d.advice&&d.advice.length?`<div class="tip" style="margin-top:14px;border-left-color:var(--amber)">
    <div class="ic">!</div><div><h4>ข้อเสนอแนะ</h4>
    ${d.advice.map(a=>`<p style="margin-top:4px">• ${a}</p>`).join('')}</div></div>`:'';
  return `<div class="slide-inner">
    <div class="eyebrow">02 · Branch Focus · ${bname}</div>
    <h2>สาขา${bname} — ยอดขายเทียบเป้า (มิถุนายน)</h2>
    <div class="hero-tgt" style="margin-top:14px">
      <div style="text-align:center;flex:none">
        <div class="bigpct" style="font-size:2.6rem;color:${tgtColor(pc)}">${pc.toFixed(1)}%</div>
        <div style="color:var(--mut);font-size:.78rem">ของเป้า</div>
      </div>
      <div class="track"><div class="fill" style="width:${Math.min(pc,100)}%;background:${tgtColor(pc)}">${fmt(d.actual)} บาท</div></div>
      <div style="flex:none;text-align:right">
        <div style="color:var(--mut);font-size:.8rem">เป้าหมาย</div>
        <div class="num" style="font-weight:700;font-size:1.15rem">${fmt(d.target)}</div>
      </div>
    </div>
    <div class="grid ${colClass}" style="margin-top:16px;align-items:start">
      ${d.staff.map(platRow).join('')}
    </div>
    ${advice}
  </div>`;
}

// 4b. Facebook ads% vs sales
function sFbAds(){
  const LIMIT=35;
  // flatten with branch, sort branches by their max pc desc for a sensible order? keep given order
  const branchBlocks=Object.entries(FBADS).map(([b,rows])=>{
    const body=rows.map(r=>{
      const over=r.pc!=null&&r.pc>LIMIT;
      const pcTxt=r.pc==null?'–':r.pc.toFixed(1)+'%';
      return `<tr>
        <td><b>${r.name}</b></td>
        <td class="num">${fmt(r.sales)}</td>
        <td class="num">${fmt(r.ads)}</td>
        <td><span class="flag ${over?'':'ok'}">${pcTxt}</span></td>
      </tr>`;
    }).join('');
    return `<div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 16px;background:#fbfaf6;border-bottom:1px solid var(--line);font-weight:700;color:var(--teal)">${b==='ส่วนกลาง'?'ส่วนกลาง':'สาขา'+b}</div>
      <table style="font-size:.82rem"><thead><tr>
        <th>เซลล์</th><th>ยอดขาย</th><th>ค่าโฆษณา</th><th>% ต่อยอด</th>
      </tr></thead><tbody>${body}</tbody></table>
    </div>`;
  }).join('');
  return `<div class="slide-inner">
    <div class="eyebrow">03 · Facebook Ads</div>
    <h2>% ค่าโฆษณา Facebook ต่อยอดขาย</h2>
    <p class="sub">เกณฑ์ค่าโฆษณา Facebook <b>ไม่เกิน 35%</b> ของยอดขาย — <span style="color:var(--red);font-weight:600">สีแดง = เกินเกณฑ์</span> · <span style="color:var(--green);font-weight:600">สีเขียว = ผ่าน</span></p>
    <div class="grid cols-3" style="margin-top:18px;align-items:start;gap:14px">
      ${branchBlocks}
    </div>
  </div>`;
}

// 5. fee rules
function sRules(){
  return `<div class="slide-inner">
    <div class="eyebrow">04 · The Rule</div>
    <h2>เกณฑ์ควบคุม % ค่าธรรมเนียมต่อยอดขาย</h2>
    <p class="sub">เกณฑ์ควบคุมค่าธรรมเนียมต่อยอดขายของแต่ละแพลตฟอร์ม เพื่อรักษากำไรให้อยู่ในระดับที่กำหนด</p>
    <div class="grid cols-2" style="margin-top:26px;max-width:720px;margin-left:auto;margin-right:auto">
    ${FEES.rules.map(([p,lim])=>{
      const cls=p==='Shopee'?'sh':'lz';
      return `<div class="card" style="text-align:center">
        <span class="chip ${cls}">${p}</span>
        <div class="num" style="font-size:3rem;font-weight:700;margin:16px 0 4px;color:var(--${cls==='sh'?'shopee':'lazada'})">${lim}</div>
        <div style="font-size:.85rem;color:var(--mut)">ค่าธรรมเนียมต่อยอดขาย</div>
      </div>`;}).join('')}
    </div>
  </div>`;
}

// 6. fee changes with links
function sFeeChange(){
  const linkBtn=(url)=>`<a href="${url}" target="_blank" rel="noopener noreferrer"
    style="display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:.8rem;
    color:var(--teal);font-weight:600;text-decoration:none;border:1px solid var(--teal);
    padding:5px 12px;border-radius:999px">🔗 ดูข้อมูลอ้างอิง</a>`;
  const card=(c)=>{
    const cls=c.plat==='Shopee'?'sh':'lz';
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span class="chip ${cls}">${c.plat}</span>
        ${c.eff?`<span class="flag" style="background:#fff6e9;color:var(--amber)">${c.eff}</span>`:''}
      </div>
      <div style="color:var(--mut);font-size:.85rem;margin-top:8px">${c.label}</div>
      <div class="num" style="font-size:2.2rem;font-weight:700;color:var(--${cls==='sh'?'shopee':'lazada'})">${c.val}</div>
      ${linkBtn(c.link)}
    </div>`;
  };
  return `<div class="slide-inner">
    <div class="eyebrow">05 · Fee Update</div>
    <h2>ประกาศปรับค่าธรรมเนียมใหม่</h2>
    <p class="sub">Shopee และ Lazada มีการปรับค่าธรรมเนียม — คลิกลิงก์เพื่อดูรายละเอียดจากแหล่งอ้างอิง (เปิดแท็บใหม่)</p>
    <div class="grid cols-2" style="margin-top:20px;align-items:start">
      ${FEES.changes.map(card).join('')}
    </div>
  </div>`;
}

// 7. July progress
function sJuly(){
  const rows=JULY.map(n=>({...n,pc:n.actual/n.target*100}));
  return `<div class="slide-inner">
    <div class="eyebrow">06 · Next Month</div>
    <h2>เป้าหมายเดือนกรกฎาคม — ความคืบหน้า ณ วันที่ 10</h2>
    <p class="sub">แต่ละสาขาทำยอดได้กี่ % ของเป้าเดือนกรกฎาคมแล้ว (ข้อมูลถึงวันที่ 10) — ยังเหลือเวลาอีก 2 ใน 3 ของเดือน</p>
    <div style="margin-top:24px">
    ${rows.map(r=>`<div class="tgt" style="margin:14px 0">
      <span class="nm">${r.branch}</span>
      <div class="track"><div class="fill" style="width:${Math.min(r.pc,100)}%;background:${tgtColor(r.pc)}">${r.pc.toFixed(1)}%</div></div>
      <span class="meta">ทำได้ <b>${fmt(r.actual)}</b> / เป้า <b>${fmt(r.target)}</b></span>
    </div>`).join('')}
    </div>
    <p class="sub" style="margin-top:18px;font-weight:600;color:var(--ink)">ขอบคุณทุกสาขาสำหรับความร่วมมือ 🙌</p>
  </div>`;
}

slides.push(sCover, sAgenda, sOverview);
Object.keys(JUNE).forEach(b=> slides.push(()=>sBranch(b)));
slides.push(sFbAds, sRules, sFeeChange, sJuly);

// ---------- render engine ----------
const deck=document.getElementById('deck');
slides.forEach((fn,i)=>{
  const el=document.createElement('section');
  el.className='slide'+(i===0?' active':'');
  el.innerHTML=fn();
  deck.appendChild(el);
});
const els=[...document.querySelectorAll('.slide')];
let idx=0;
document.getElementById('tot').textContent=els.length;
const dots=document.getElementById('dots');
els.forEach((_,i)=>{const s=document.createElement('span');if(i===0)s.className='on';
  s.onclick=()=>go(i);dots.appendChild(s);});
const dotEls=[...dots.children];
function go(n){
  n=Math.max(0,Math.min(els.length-1,n));
  els[idx].classList.remove('active');dotEls[idx].classList.remove('on');
  idx=n;
  els[idx].classList.add('active');dotEls[idx].classList.add('on');
  document.getElementById('cur').textContent=idx+1;
  document.getElementById('sno').textContent=(idx+1)+' / '+els.length;
  document.getElementById('prog').style.width=((idx+1)/els.length*100)+'%';
  els[idx].scrollTop=0;
}
document.getElementById('next').onclick=()=>go(idx+1);
document.getElementById('prev').onclick=()=>go(idx-1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(idx+1)}
  if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(idx-1)}
  if(e.key==='Home')go(0); if(e.key==='End')go(els.length-1);
});
deck.addEventListener('click',e=>{
  if(e.target.closest('.nav,.dots,a,button,table'))return;
  const x=e.clientX, w=window.innerWidth;
  if(x>w*0.62)go(idx+1); else if(x<w*0.38)go(idx-1);
});
go(0);
</script>
</body>
</html>
